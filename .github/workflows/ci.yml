---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run ty check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest
